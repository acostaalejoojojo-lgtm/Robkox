<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxelSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #1a1b1e; /* Darker theme */
        color: white;
        overflow-x: hidden;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1b1e;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f4147;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4f5157;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "three": "https://esm.sh/three@^0.182.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "three/": "https://esm.sh/three@^0.182.0/",
    "socket.io-client": "https://esm.sh/socket.io-client@^4.8.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root">
      <div style="height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #1a1b1e; color: white; font-family: sans-serif;">
        <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5);">
          <div style="width: 30px; height: 30px; background-color: white; border-radius: 6px; transform: rotate(45deg);"></div>
        </div>
        <h1 style="font-size: 28px; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 8px; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">VOXELSPHERE</h1>
        <div style="width: 200px; height: 6px; background-color: #2b2d31; border-radius: 3px; overflow: hidden;">
          <div style="width: 30%; height: 100%; background: linear-gradient(to right, #3b82f6, #8b5cf6); animation: loading 2s infinite ease-in-out;"></div>
        </div>
        <p style="margin-top: 16px; color: #9ca3af; font-size: 14px; font-weight: 500;">Sincronizando mundos...</p>
      </div>
    </div>
    <style>
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
