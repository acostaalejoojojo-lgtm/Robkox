<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glidrovia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #1a1b1e; /* Darker theme */
        color: white;
        overflow-x: hidden;
        user-select: none; /* Block selection */
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1b1e;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f4147;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4f5157;
      }
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
    </style>
    <script>
      // BLOQUEO DEFINITIVO DE CÓDIGO FUENTE
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        if(e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false; // Ctrl+S
      };
    </script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root">
      <div style="height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #1a1b1e; color: white; font-family: sans-serif;">
        <div style="width: 100px; height: 100px; background: #2563eb; border: 4px solid white; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4); position: relative;">
          <div style="width: 40px; height: 10px; background-color: white; border-radius: 5px; transform: rotate(-45deg); position: absolute; top: 30px; left: 20px;"></div>
          <div style="width: 10px; height: 40px; background-color: white; border-radius: 5px; transform: rotate(-45deg); position: absolute; top: 20px; left: 30px;"></div>
          <div style="width: 40px; height: 8px; background-color: rgba(255,255,255,0.8); border-radius: 4px; transform: rotate(15deg); position: absolute; bottom: 25px; right: 15px;"></div>
        </div>
        <h1 style="font-size: 32px; font-weight: 900; letter-spacing: 2px; margin-bottom: 8px; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">GLIDROVIA</h1>
        <div style="width: 240px; height: 4px; background-color: #2b2d31; border-radius: 2px; overflow: hidden;">
          <div style="width: 30%; height: 100%; background: linear-gradient(to right, #3b82f6, #8b5cf6); animation: loading 1.5s infinite ease-in-out;"></div>
        </div>
        <p style="margin-top: 16px; color: #9ca3af; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Sincronizando mundos...</p>
      </div>
    </div>
    <style>
      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }
    </style>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
